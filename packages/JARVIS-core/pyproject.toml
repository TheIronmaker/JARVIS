[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "jarvis-core"
version = "0.1.0"
license = { text = "Apache-2.0" } 
dependencies = [
    "pyzmq",
    "msgpack",
    "opencv-python",
    "platformdirs",
    "pyyaml",
]

[project.optional-dependencies]
hand-tracking = [
    "mediapipe"
]

[tool.setuptools.packages.find]
where = ["src"]