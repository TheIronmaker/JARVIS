[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "jarvis-app"
version = "0.1.0"
license = { text = "Apache-2.0" } 
dependencies = [
    "jarvis-core",
    "PySide6",
    "numpy",
    "opencv-python"
]

[project.optional-dependencies]
OpenGL-engine = [
    "PyOpenGL",
    "PyGLM",
]

ModernGL-engine = [
    "ModernGL",
    "PyGLM"
]

all-engine = [
    "PyOpenGL",
    "ModernGL",
    "PyGLM",
]

[tool.setuptools.packages.find]
where = ["src"]