[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "jarvis-kinematics"
version = "0.1.0"
license = { text = "Apache-2.0" } 

dependencies = [
    "jarvis-core",
    "sympy",
    "matplotlib",
    "numpy"
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
jarvis-kinematics = { workspace = true }