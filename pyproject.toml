[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jarvis"
version = "0.1.2"
description = "JARVIS Modular Control System"
authors = [{name = "Andy"}]
dependencies = [
    "PySide6",
    "mediapipe",
    "opencv-python"
    "adafruit-circuitpython-servokit"
]

[tool.setuptools.packages.find]
where = ["src"]
